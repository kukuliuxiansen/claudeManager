<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能详情 - Claude Manager</title>
    <link rel="stylesheet" href="../styles/shared.css">
    <style>
        .detail-container { max-width: 1000px; margin: 0 auto; padding: 40px; }
        .detail-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 20px; padding: 50px; margin-bottom: 40px;
            position: relative; overflow: hidden;
        }
        .detail-header::before {
            content: ''; position: absolute; top: -50%; right: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .detail-icon {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; backdrop-filter: blur(10px);
        }
        .detail-icon svg { width: 40px; height: 40px; fill: white; }
        .detail-title { font-size: 36px; font-weight: 700; color: white; margin-bottom: 10px; letter-spacing: -1px; }
        .detail-subtitle { font-size: 18px; color: rgba(255,255,255,0.8); font-weight: 400; }
        .detail-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.9); }
        .section-card { background: rgba(26, 26, 46, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .section-title { font-size: 24px; font-weight: 600; color: #10b981; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title svg { width: 24px; height: 24px; fill: #10b981; }
        .section-content { font-size: 16px; color: rgba(255, 255, 255, 0.8); line-height: 1.8; }
        .feature-list { list-style: none; padding: 0; margin: 0; }
        .feature-list li { padding: 15px 20px; background: rgba(0, 0, 0, 0.3); border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(16, 185, 129, 0.15); display: flex; align-items: flex-start; gap: 15px; }
        .feature-list li:last-child { margin-bottom: 0; }
        .feature-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .feature-icon svg { width: 20px; height: 20px; fill: white; }
        .feature-content { flex: 1; }
        .feature-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 5px; }
        .feature-desc { font-size: 14px; color: rgba(255, 255, 255, 0.6); }
        .code-block { background: #1e1e3f; border-radius: 12px; padding: 20px; margin: 20px 0; border: 1px solid rgba(255, 255, 255, 0.1); overflow-x: auto; }
        .code-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .code-lang { font-size: 12px; color: #10b981; font-weight: 500; }
        .code-copy { padding: 6px 12px; background: rgba(16, 185, 129, 0.2); border: none; border-radius: 6px; color: rgba(255, 255, 255, 0.8); cursor: pointer; font-size: 12px; transition: all 0.3s ease; }
        .code-copy:hover { background: rgba(16, 185, 129, 0.3); color: #fff; }
        pre { margin: 0; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 14px; line-height: 1.6; color: rgba(255, 255, 255, 0.9); white-space: pre-wrap; }
        code { font-family: inherit; }
        .tips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .tip-card { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 12px; padding: 20px; }
        .tip-number { width: 30px; height: 30px; background: #10b981; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 10px; }
        .tip-text { font-size: 15px; color: rgba(255, 255, 255, 0.8); }
        .detail-nav { display: flex; justify-content: space-between; gap: 20px; margin-top: 40px; padding-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-card { flex: 1; background: rgba(26, 26, 46, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.3s ease; }
        .nav-card:hover { border-color: rgba(16, 185, 129, 0.3); background: rgba(26, 26, 46, 0.8); }
        .nav-card.disabled { opacity: 0.5; pointer-events: none; }
        .nav-label { font-size: 12px; color: rgba(255, 255, 255, 0.5); margin-bottom: 5px; }
        .nav-title { font-size: 16px; color: rgba(255, 255, 255, 0.8); font-weight: 500; }
        .loading { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); font-size: 18px; }
        .error-message { text-align: center; padding: 60px; color: #ef4444; font-size: 18px; }
        .breadcrumb { padding: 20px 40px; }
        .breadcrumb-link { color: rgba(255,255,255,0.7); text-decoration: none; }
        .breadcrumb-link:hover { color: #10b981; }
        .breadcrumb-separator { color: rgba(255,255,255,0.3); margin: 0 10px; }
        .breadcrumb-current { color: #10b981; font-weight: 500; }
        @media (max-width: 768px) { .detail-container { padding: 20px; } .detail-header { padding: 30px; } .detail-title { font-size: 28px; } .section-card { padding: 20px; } .tips-grid { grid-template-columns: 1fr; } .detail-nav { flex-direction: column; } }
    </style>
</head>
<body>
    <nav class="breadcrumb">
        <a href="../index.html" class="breadcrumb-link">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="skills.html" class="breadcrumb-link">Skills</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current" id="breadcrumbName">加载中...</span>
    </nav>

    <div class="detail-container" id="detailContainer">
        <div class="loading">加载技能详情...</div>
    </div>

    <script src="skills-data.js"></script>
    <script src="skills-chinese.js"></script>
    <script>
        // 解析URL参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return { name: params.get('name') };
        }

        // 获取所有技能名称排序
        function getAllSkillNames() {
            return Object.keys(CAPABILITIES_DATA).filter(name => CAPABILITIES_DATA[name].type === 'skill').sort();
        }

        // 获取相邻技能
        function getAdjacentSkills(skillName) {
            const allNames = getAllSkillNames();
            const currentIndex = allNames.indexOf(skillName);
            return {
                prev: currentIndex > 0 ? allNames[currentIndex - 1] : null,
                next: currentIndex < allNames.length - 1 ? allNames[currentIndex + 1] : null
            };
        }

        // 创建SVG图标
        function createSVGIcon(svgPath) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 24 24');
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', svgPath);
            svg.appendChild(path);
            return svg;
        }

        // 渲染技能详情
        function renderSkillDetail(skillName) {
            const container = document.getElementById('detailContainer');
            const breadcrumb = document.getElementById('breadcrumbName');

            // 清除加载状态
            container.innerHTML = '';
            breadcrumb.textContent = skillName;

            // 检查技能是否存在
            if (!CAPABILITIES_DATA[skillName] || CAPABILITIES_DATA[skillName].type !== 'skill') {
                container.innerHTML = '<div class="error-message">未找到技能: ' + skillName + '</div>';
                return;
            }

            const skill = CAPABILITIES_DATA[skillName];
            const adjacent = getAdjacentSkills(skillName);
            const chineseDesc = getSkillChineseDescription(skillName);

            // 构建头部
            const header = document.createElement('header');
            header.className = 'detail-header';

            const iconDiv = document.createElement('div');
            iconDiv.className = 'detail-icon';
            iconDiv.appendChild(createSVGIcon('M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z'));
            header.appendChild(iconDiv);

            const title = document.createElement('h1');
            title.className = 'detail-title';
            title.textContent = skill.title || skillName;
            header.appendChild(title);

            const subtitle = document.createElement('p');
            subtitle.className = 'detail-subtitle';
            subtitle.textContent = chineseDesc || skill.description || '无描述';
            header.appendChild(subtitle);

            const badge = document.createElement('div');
            badge.className = 'detail-badge';
            badge.appendChild(createSVGIcon('M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z'));
            badge.appendChild(document.createTextNode(' 来源: ' + skill.origin + ' | 类型: Skill'));
            header.appendChild(badge);

            container.appendChild(header);

            // 实现效果 section
            const effectSection = document.createElement('section');
            effectSection.className = 'section-card';

            const effectTitle = document.createElement('h2');
            effectTitle.className = 'section-title';
            effectTitle.appendChild(createSVGIcon('M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'));
            effectTitle.appendChild(document.createTextNode(' 实现效果'));
            effectSection.appendChild(effectTitle);

            const effectContent = document.createElement('div');
            effectContent.className = 'section-content';
            effectContent.innerHTML = '<p>' + (chineseDesc || skill.description || '该技能为 Claude Code 提供专业的工作流支持。') + '</p>';
            effectSection.appendChild(effectContent);

            // 功能列表
            const featureList = document.createElement('ul');
            featureList.className = 'feature-list';

            const features = getSkillFeatures(skillName);
            features.forEach(feature => {
                const li = document.createElement('li');

                const iconDiv = document.createElement('div');
                iconDiv.className = 'feature-icon';
                iconDiv.appendChild(createSVGIcon('M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'));
                li.appendChild(iconDiv);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'feature-content';

                const title = document.createElement('h4');
                title.className = 'feature-title';
                title.textContent = feature.title;
                contentDiv.appendChild(title);

                const desc = document.createElement('p');
                desc.className = 'feature-desc';
                desc.textContent = feature.desc;
                contentDiv.appendChild(desc);

                li.appendChild(contentDiv);
                featureList.appendChild(li);
            });
            effectSection.appendChild(featureList);
            container.appendChild(effectSection);

            // 核心原理 section
            const principleSection = document.createElement('section');
            principleSection.className = 'section-card';

            const principleTitle = document.createElement('h2');
            principleTitle.className = 'section-title';
            principleTitle.appendChild(createSVGIcon('M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z'));
            principleTitle.appendChild(document.createTextNode(' 核心原理'));
            principleSection.appendChild(principleTitle);

            const principleContent = document.createElement('div');
            principleContent.className = 'section-content';
            const principleText = getSkillPrinciple(skillName);
            principleContent.innerHTML = principleText;
            principleSection.appendChild(principleContent);
            container.appendChild(principleSection);

            // 使用方法 section
            const usageSection = document.createElement('section');
            usageSection.className = 'section-card';

            const usageTitle = document.createElement('h2');
            usageTitle.className = 'section-title';
            usageTitle.appendChild(createSVGIcon('M11 7h2v2h-2zm0 4h2v2h-2zm0 4h2v2h-2zm6-10h-4v2h4v2h2V5c0-1.1-.9-2-2-2zm0 14h-4v2h4c1.1 0 2-.9 2-2v-2h-2v2zM5 7h2V5c0-1.1.9-2 2-2h4v2H9v2h4v2H9v2h4v2H9v2h4v2H9v4h4v2H9c-1.1 0-2-.9-2-2v-2H5v-2h2v-2H5v-2h2v-2H5v-2h2V7z'));
            usageTitle.appendChild(document.createTextNode(' 使用方法'));
            usageSection.appendChild(usageTitle);

            const usageContent = document.createElement('div');
            usageContent.className = 'section-content';
            usageContent.innerHTML = '<p>在 Claude Code 中调用此技能:</p>';
            usageSection.appendChild(usageContent);

            // 代码块
            const codeBlock = document.createElement('div');
            codeBlock.className = 'code-block';

            const codeHeader = document.createElement('div');
            codeHeader.className = 'code-header';

            const codeLang = document.createElement('span');
            codeLang.className = 'code-lang';
            codeLang.textContent = '调用命令';
            codeHeader.appendChild(codeLang);

            const copyBtn = document.createElement('button');
            copyBtn.className = 'code-copy';
            copyBtn.textContent = '复制';
            copyBtn.onclick = function() {
                navigator.clipboard.writeText('/' + skillName).then(() => {
                    copyBtn.textContent = '已复制';
                    setTimeout(() => copyBtn.textContent = '复制', 2000);
                });
            };
            codeHeader.appendChild(copyBtn);
            codeBlock.appendChild(codeHeader);

            const pre = document.createElement('pre');
            const code = document.createElement('code');
            code.textContent = '/' + skillName + '\n\n// 或者带参数调用\n/' + skillName + ' [参数]';
            pre.appendChild(code);
            codeBlock.appendChild(pre);
            usageSection.appendChild(codeBlock);

            const tipPara = document.createElement('p');
            tipPara.style.marginTop = '15px';
            tipPara.style.color = 'rgba(255,255,255,0.6)';
            tipPara.textContent = '直接在 Claude Code 会话中输入上述命令即可激活该技能。';
            usageSection.appendChild(tipPara);
            container.appendChild(usageSection);

            // 使用技巧 section
            const tipsSection = document.createElement('section');
            tipsSection.className = 'section-card';

            const tipsTitle = document.createElement('h2');
            tipsTitle.className = 'section-title';
            tipsTitle.appendChild(createSVGIcon('M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z'));
            tipsTitle.appendChild(document.createTextNode(' 使用技巧'));
            tipsSection.appendChild(tipsTitle);

            const tipsGrid = document.createElement('div');
            tipsGrid.className = 'tips-grid';

            const tips = getSkillTips(skillName);
            tips.forEach((tip, i) => {
                const tipCard = document.createElement('div');
                tipCard.className = 'tip-card';

                const tipNumber = document.createElement('div');
                tipNumber.className = 'tip-number';
                tipNumber.textContent = String(i + 1);
                tipCard.appendChild(tipNumber);

                const tipText = document.createElement('p');
                tipText.className = 'tip-text';
                const strong = document.createElement('strong');
                strong.textContent = tip.title;
                tipText.appendChild(strong);
                tipText.appendChild(document.createTextNode(' - ' + tip.content));
                tipCard.appendChild(tipText);

                tipsGrid.appendChild(tipCard);
            });
            tipsSection.appendChild(tipsGrid);
            container.appendChild(tipsSection);

            // 输出示例 section
            const exampleSection = document.createElement('section');
            exampleSection.className = 'section-card';

            const exampleTitle = document.createElement('h2');
            exampleTitle.className = 'section-title';
            exampleTitle.appendChild(createSVGIcon('M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v12z'));
            exampleTitle.appendChild(document.createTextNode(' 输出示例'));
            exampleSection.appendChild(exampleTitle);

            const exampleContent = document.createElement('div');
            exampleContent.className = 'section-content';
            const exampleText = getSkillExample(skillName);
            exampleContent.innerHTML = exampleText;
            exampleSection.appendChild(exampleContent);
            container.appendChild(exampleSection);

            // 导航
            const navDiv = document.createElement('div');
            navDiv.className = 'detail-nav';

            // 上一个
            const prevCard = document.createElement('div');
            prevCard.className = 'nav-card' + (adjacent.prev ? '' : ' disabled');

            const prevLabel = document.createElement('div');
            prevLabel.className = 'nav-label';
            prevLabel.textContent = '上一个';
            prevCard.appendChild(prevLabel);

            const prevTitle = document.createElement('div');
            prevTitle.className = 'nav-title';
            prevTitle.textContent = adjacent.prev || '无';
            prevCard.appendChild(prevTitle);

            if (adjacent.prev) {
                prevCard.onclick = () => navigateTo(adjacent.prev);
            }
            navDiv.appendChild(prevCard);

            // 下一个
            const nextCard = document.createElement('div');
            nextCard.className = 'nav-card' + (adjacent.next ? '' : ' disabled');

            const nextLabel = document.createElement('div');
            nextLabel.className = 'nav-label';
            nextLabel.textContent = '下一个';
            nextCard.appendChild(nextLabel);

            const nextTitle = document.createElement('div');
            nextTitle.className = 'nav-title';
            nextTitle.textContent = adjacent.next || '无';
            nextCard.appendChild(nextTitle);

            if (adjacent.next) {
                nextCard.onclick = () => navigateTo(adjacent.next);
            }
            navDiv.appendChild(nextCard);

            container.appendChild(navDiv);
        }

        // 获取技能功能特性
        function getSkillFeatures(skillName) {
            const defaults = [
                { title: '专业工作流', desc: '为特定任务提供优化的工作流程支持' },
                { title: '自动触发', desc: '在合适的场景下自动激活，无需手动调用' },
                { title: '高质量输出', desc: '遵循最佳实践，确保输出质量' },
                { title: '灵活配置', desc: '可根据项目需求进行自定义配置' }
            ];

            // 根据技能名称返回特定功能
            const specificFeatures = {
                'tdd-workflow': [
                    { title: '强制 TDD 流程', desc: '确保每个功能都先编写测试用例' },
                    { title: '覆盖率保证', desc: '自动验证测试覆盖率 80% 以上' },
                    { title: '重构引导', desc: '在测试通过后引导进行安全的代码重构' },
                    { title: '持续验证', desc: '每次修改后自动运行测试验证正确性' }
                ],
                'security-reviewer': [
                    { title: '安全漏洞扫描', desc: '检测 OWASP Top 10 安全漏洞' },
                    { title: '代码审计', desc: '审查代码中的安全隐患' },
                    { title: '修复建议', desc: '提供具体的安全修复方案' },
                    { title: '合规检查', desc: '验证是否符合安全合规要求' }
                ],
                'code-reviewer': [
                    { title: '质量审查', desc: '检查代码质量和最佳实践' },
                    { title: '风格一致性', desc: '确保代码符合项目风格规范' },
                    { title: '性能分析', desc: '识别潜在的性能问题' },
                    { title: '重构建议', desc: '提供代码改进建议' }
                ]
            };

            return specificFeatures[skillName] || defaults;
        }

        // 获取技能核心原理
        function getSkillPrinciple(skillName) {
            const defaults = '<p>该技能基于 Claude Code 的智能识别机制，在检测到相关场景时自动激活，提供专业的工作流支持。</p><p style="margin-top:20px"><strong>工作流程</strong>:</p><ul style="margin-left:20px; color:rgba(255,255,255,0.7)"><li>场景检测 - 识别需要该技能的任务类型</li><li>自动激活 - 无需手动调用，自动进入工作模式</li><li>专业处理 - 按照最佳实践执行任务</li><li>结果验证 - 确保输出符合预期标准</li></ul>';

            const specificPrinciples = {
                'tdd-workflow': '<p>TDD 的核心原理是<strong>红-绿-重构循环</strong>。先写失败的测试(RED)，再写最少代码使测试通过(GREEN)，最后重构优化代码(REFACTOR)。</p><p style="margin-top:20px"><strong>TDD 三定律</strong>:</p><ul style="margin-left:20px; color:rgba(255,255,255,0.7)"><li><strong>第一定律</strong>: 在编写失败的单元测试之前，不编写产品代码</li><li><strong>第二定律</strong>: 只编写足以失败的测试，不编写更多的测试</li><li><strong>第三定律</strong>: 只编写足以通过当前失败测试的产品代码</li></ul><p style="margin-top:20px"><strong>收益</strong>:</p><ul style="margin-left:20px; color:rgba(255,255,255,0.7)"><li>更高的代码质量和更少的 Bug</li><li>更好的代码设计和解耦</li><li>完整的测试文档</li><li>更自信的重构能力</li></ul>',
                'security-reviewer': '<p>安全审查的核心原理是<strong>防御性编程</strong>和<strong>最小权限原则</strong>。通过系统性地检查代码中的安全隐患，确保应用的安全性。</p><p style="margin-top:20px"><strong>检查维度</strong>:</p><ul style="margin-left:20px; color:rgba(255,255,255,0.7)"><li>输入验证 - 确保所有用户输入都经过验证</li><li>认证授权 - 检查身份验证和权限控制</li><li>数据保护 - 验证敏感数据的加密和存储</li><li>错误处理 - 确保错误信息不泄露敏感信息</li></ul>',
                'code-reviewer': '<p>代码审查的核心原理是<strong>多维评估</strong>和<strong>持续改进</strong>。从质量、安全、性能等多个维度评估代码，推动代码质量持续提升。</p><p style="margin-top:20px"><strong>评估维度</strong>:</p><ul style="margin-left:20px; color:rgba(255,255,255,0.7)"><li>代码质量 - 可读性、可维护性、复杂度</li><li>最佳实践 - 是否遵循项目规范和行业标准</li><li>潜在问题 - Bug 风险、性能瓶颈、安全隐患</li><li>改进建议 - 具体的优化和重构方案</li></ul>'
            };

            return specificPrinciples[skillName] || defaults;
        }

        // 获取技能使用技巧
        function getSkillTips(skillName) {
            const defaults = [
                { title: '查看源文件', content: '技能文件位于 ~/.claude/skills/' + skillName + '/SKILL.md' },
                { title: '自定义修改', content: '可以直接编辑 SKILL.md 文件来定制技能行为' },
                { title: '参数传递', content: '某些技能支持额外参数，如 /' + skillName + ' [参数]' },
                { title: '组合使用', content: '可以与其他技能或代理配合使用完成复杂任务' }
            ];

            const specificTips = {
                'tdd-workflow': [
                    { title: '小步快跑', content: '每次只测试一个行为，保持测试简单' },
                    { title: '命名清晰', content: '测试名称应描述预期行为' },
                    { title: '快速反馈', content: '测试应该快速运行，便于频繁执行' },
                    { title: '覆盖边界', content: '测试正常、边界和异常情况' }
                ],
                'security-reviewer': [
                    { title: '主动使用', content: '在编写代码后立即进行安全审查' },
                    { title: '重点关注', content: '优先审查处理用户输入的代码' },
                    { title: '深度检查', content: '不要只看表面，深入分析数据流' },
                    { title: '及时修复', content: '发现安全问题后立即修复' }
                ],
                'code-reviewer': [
                    { title: '及时审查', content: '代码写完后立即审查，不要积累' },
                    { title: '关注重点', content: '优先处理 CRITICAL 和 HIGH 级别问题' },
                    { title: '理解建议', content: '理解审查建议背后的原因' },
                    { title: '持续改进', content: '将审查结果作为学习机会' }
                ]
            };

            return specificTips[skillName] || defaults;
        }

        // 获取技能输出示例
        function getSkillExample(skillName) {
            const defaultExample = '<div class="code-block"><div class="code-header"><span class="code-lang">执行报告</span><button class="code-copy" onclick="copyCode(this)">复制</button></div><pre><code># ' + skillName + ' 执行报告\n\n## 任务概述\n- **任务**: 用户请求的处理\n- **状态**: 已完成\n- **耗时**: 根据任务复杂度而定\n\n---\n\n## 执行过程\n1. 分析用户请求\n2. 确定处理策略\n3. 执行相关操作\n4. 验证结果正确性\n\n---\n\n## 输出结果\n任务已成功完成，输出符合预期标准。</code></pre></div>';

            const specificExamples = {
                'tdd-workflow': '<div class="code-block"><div class="code-header"><span class="code-lang">TDD Workflow Report</span><button class="code-copy" onclick="copyCode(this)">复制</button></div><pre><code># TDD Workflow Report: User Authentication\n\n## TDD Cycle Summary\n- **Feature**: User Authentication Module\n- **Test Cases Written**: 12\n- **Tests Passed**: 12\n- **Code Coverage**: 92%\n\n---\n\n## RED Phase\n### Test 1: Login with invalid credentials\n```javascript\ndescribe(\'UserAuth\', () => {\n  it(\'should reject invalid credentials\', async () => {\n    await expect(auth.login(\'wrong\', \'pass\'))\n      .rejects.toThrow(\'Invalid credentials\')\n  })\n})\n```\n**Status**: ✗ FAILING (as expected)\n\n---\n\n## GREEN Phase\n### Implementation\n```javascript\nclass UserAuth {\n  async login(username, password) {\n    const user = await this.db.findUser(username)\n    if (!user || !this.verify(password, user.password)) {\n      throw new Error(\'Invalid credentials\')\n    }\n    return this.generateToken(user)\n  }\n}\n```\n**Status**: ✓ PASSING\n\n---\n\n## Coverage Report\n| File | Statements | Branches | Functions | Lines |\n|------|-----------|----------|-----------|-------|\n| auth.js | 95% | 88% | 100% | 94% |\n| token.js | 90% | 85% | 92% | 89% |\n| **Total** | **92%** | **86%** | **96%** | **91%** |</code></pre></div>',
                'security-reviewer': '<div class="code-block"><div class="code-header"><span class="code-lang">Security Review Report</span><button class="code-copy" onclick="copyCode(this)">复制</button></div><pre><code># Security Review Report\n\n## Summary\n- **Files Reviewed**: 15\n- **Issues Found**: 3 CRITICAL, 5 HIGH, 8 MEDIUM\n- **Status**: 需要修复\n\n---\n\n## CRITICAL Issues\n### 1. Hardcoded Secret in auth.js:25\n```javascript\n// 发现硬编码的 API Key\nconst apiKey = "sk-proj-xxxxx"  // CRITICAL: 需要使用环境变量\n```\n**修复建议**: 使用 `process.env.API_KEY` 替换硬编码值\n\n---\n\n## HIGH Issues\n### 1. SQL Injection Risk in query.js:42\n```javascript\n// 存在 SQL 注入风险\nconst query = `SELECT * FROM users WHERE id = ${userId}`\n```\n**修复建议**: 使用参数化查询\n\n---\n\n## Recommendations\n1. 所有 CRITICAL 问题必须立即修复\n2. HIGH 问题应在提交前修复\n3. MEDIUM 问题建议在后续迭代中处理</code></pre></div>',
                'code-reviewer': '<div class="code-block"><div class="code-header"><span class="code-lang">Code Review Report</span><button class="code-copy" onclick="copyCode(this)">复制</button></div><pre><code># Code Review Report\n\n## Summary\n- **Files Reviewed**: 8\n- **Quality Score**: 85/100\n- **Issues**: 2 CRITICAL, 3 HIGH, 5 MEDIUM\n\n---\n\n## CRITICAL Issues\n### 1. Deep Nesting in utils.js:45\n```javascript\n// 嵌套层级超过 4 层\nif (a) {\n  if (b) {\n    if (c) {\n      if (d) {\n        // 逻辑过于复杂\n      }\n    }\n  }\n}\n```\n**建议**: 提取为独立函数或使用早返回\n\n---\n\n## HIGH Issues\n### 1. Missing Error Handling in api.js:78\n```javascript\n// 缺少错误处理\nasync function fetchData() {\n  const response = await fetch(url)\n  return response.json()  // 未处理网络错误\n}\n```\n**建议**: 添加 try-catch 和错误日志\n\n---\n\n## Best Practices Followed\n- ✓ 函数命名清晰\n- ✓ 文件结构合理\n- ✓ 无硬编码值</code></pre></div>'
            };

            return specificExamples[skillName] || defaultExample;
        }

        // 复制代码功能
        function copyCode(btn) {
            const codeBlock = btn.closest('.code-block');
            const code = codeBlock.querySelector('pre code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }

        // 导航到另一个技能
        function navigateTo(skillName) {
            if (skillName && CAPABILITIES_DATA[skillName] && CAPABILITIES_DATA[skillName].type === 'skill') {
                window.location.href = 'skill-detail.html?name=' + encodeURIComponent(skillName);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const params = getUrlParams();
            if (params.name) {
                renderSkillDetail(params.name);
            } else {
                document.getElementById('detailContainer').innerHTML = '<div class="error-message">未指定技能名称</div>';
            }
        });
    </script>
</body>
</html>
